name: faker-ai-mcp
description: MCP server for faker ai. Features fake person, fake company, fake dataset.
  From MEOK AI Labs.
version: 1.0.0
tools:
- name: fake_person
  description: 'Generate fake person: name, email, phone, address, DOB.'
  parameters:
  - name: locale
    type: string
    required: false
- name: fake_company
  description: 'Generate fake company: name, industry, address, phone, website.'
  parameters:
  - name: locale
    type: string
    required: false
- name: fake_dataset
  description: Generate a fake dataset with specified columns.
  parameters:
  - name: rows
    type: integer
    required: false
  - name: columns
    type: string
    required: false
- name: fake_credit_card
  description: Generate fake credit card number (Luhn-valid but not real).
  parameters: []
